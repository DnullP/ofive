name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BUN_VERSION: 1.2.22

jobs:
  release-version:
    name: Validate Release Version
    runs-on: ubuntu-24.04
    outputs:
      release-version: ${{ steps.version.outputs.release-version }}
      release-prerelease: ${{ steps.version.outputs.release-prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate release tag and project versions
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          semver_re='^v([0-9]+)\.([0-9]+)\.([0-9]+)(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$'
          if [[ "${tag}" =~ ${semver_re} ]]; then
            base_version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
            prerelease="false"
            if [[ -n "${BASH_REMATCH[4]}" ]]; then
              prerelease="true"
            fi
          else
            echo "::error::Release tags must use SemVer form v0.0.1 or v0.0.1-alpha. Got: ${tag}"
            exit 1
          fi
          version="${tag#v}"

          node - "${version}" "${base_version}" <<'NODE'
          const fs = require("node:fs");

          const releaseVersion = process.argv[2];
          const expectedBaseVersion = process.argv[3];
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const tauriConfig = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const cargoToml = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargoToml.match(/^\[package\][\s\S]*?^version\s*=\s*"([^"]+)"/m)?.[1];

          const versions = new Map([
            ["package.json", packageJson.version],
            ["src-tauri/tauri.conf.json", tauriConfig.version],
            ["src-tauri/Cargo.toml", cargoVersion],
          ]);

          for (const [source, actual] of versions.entries()) {
            if (actual !== expectedBaseVersion) {
              console.error(`${source} version ${actual ?? "<missing>"} does not match release tag base version ${expectedBaseVersion} (${releaseVersion})`);
              process.exit(1);
            }
          }
          NODE

          echo "release-version=${version}" >> "${GITHUB_OUTPUT}"
          echo "release-prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

  go-sidecar:
    name: Go Sidecar
    runs-on: ubuntu-22.04
    needs: release-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/go/ofive-ai-agent/go.mod

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run Go sidecar tests
        run: bun run test:go

      - name: Build Go sidecar binary
        run: bun run build:go-sidecar

      - name: Verify generated Go stubs are up to date
        run: git diff --exit-code -- sidecars/go/ofive-ai-agent/gen/ofive/aiv1

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-22.04
    needs: release-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup local layout-v2 dependency
        uses: ./.github/actions/setup-local-layout-v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend unit tests
        run: bun run test:ci:unit

  rust-tests-core:
    name: Rust Tests Core
    runs-on: ubuntu-24.04
    needs: release-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup local layout-v2 dependency
        uses: ./.github/actions/setup-local-layout-v2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run Rust core tests
        run: bun run test:rust:core -- --test-threads=1

      - name: Upload Rust core test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-rust-core-test-artifacts
          path: |
            src-tauri/target/**/*.log
            src-tauri/target/**/*.txt
          if-no-files-found: ignore

  rust-tests-sidecar:
    name: Rust Tests Sidecar
    runs-on: ubuntu-24.04
    needs: release-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup local layout-v2 dependency
        uses: ./.github/actions/setup-local-layout-v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/go/ofive-ai-agent/go.mod

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Go sidecar binary
        run: bun run build:go-sidecar

      - name: Run Rust sidecar tests
        run: bun run test:rust:sidecar -- --test-threads=1

      - name: Upload Rust sidecar test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-rust-sidecar-test-artifacts
          path: |
            src-tauri/target/**/*.log
            src-tauri/target/**/*.txt
            /tmp/ofive-ai-sidecar-test-*.log
          if-no-files-found: ignore

  e2e-tests:
    name: Playwright E2E
    runs-on: ubuntu-22.04
    needs: release-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup local layout-v2 dependency
        uses: ./.github/actions/setup-local-layout-v2

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bun run test:playwright:install

      - name: Run Playwright end-to-end tests
        run: bun run test:e2e:ci --reporter=line

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-e2e-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  production-build:
    name: Production Build
    runs-on: ubuntu-22.04
    needs: release-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup local layout-v2 dependency
        uses: ./.github/actions/setup-local-layout-v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Verify production build
        run: bun run build

  build-macos-installer:
    name: Build macOS ARM64
    needs:
      - release-version
    runs-on: macos-15
    env:
      OFIVE_SIDECAR_PROFILE: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify macOS ARM64 runner
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$(uname -m)" != "arm64" ]]; then
            echo "::error::Release packaging must run on an arm64 macOS runner."
            uname -a
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup local layout-v2 dependency
        uses: ./.github/actions/setup-local-layout-v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/go/ofive-ai-agent/go.mod

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri installer bundle
        shell: bash
        run: bun run tauri build --target "aarch64-apple-darwin" --ci

      - name: Verify app bundle signature
        shell: bash
        run: |
          set -euo pipefail

          app_path="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/ofive.app"
          if [[ ! -d "${app_path}" ]]; then
            echo "::error::Built app bundle not found: ${app_path}"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "${app_path}"
          codesign -dv --verbose=4 "${app_path}"

      - name: Collect installer assets
        shell: bash
        run: |
          set -euo pipefail

          bundle_root="src-tauri/target/aarch64-apple-darwin/release/bundle"
          if [[ ! -d "${bundle_root}" ]]; then
            bundle_root="src-tauri/target/release/bundle"
          fi

          if [[ ! -d "${bundle_root}" ]]; then
            echo "::error::Tauri bundle directory not found for target aarch64-apple-darwin"
            exit 1
          fi

          mkdir -p release-assets
          while IFS= read -r -d '' artifact; do
            base="$(basename "${artifact}")"
            cp "${artifact}" "release-assets/macos-arm64-${base}"
          done < <(
            find "${bundle_root}" -type f -name "*.dmg" -print0
          )

          if [[ -z "$(find release-assets -type f -print -quit)" ]]; then
            echo "::error::No installer assets found under ${bundle_root}"
            find "${bundle_root}" -maxdepth 4 -type f -print
            exit 1
          fi

          ls -la release-assets

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ofive-macos-arm64-${{ github.ref_name }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - release-version
      - build-macos-installer
      - build-windows-installer
      - go-sidecar
      - frontend-unit
      - rust-tests-core
      - rust-tests-sidecar
      - e2e-tests
      - production-build
    runs-on: ubuntu-latest
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ofive-*-${{ github.ref_name }}
          path: release-assets
          merge-multiple: true

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -d release-assets ]] || [[ -z "$(find release-assets -type f -print -quit)" ]]; then
            echo "::error::No installer artifacts were produced by any platform build. Skipping release publication."
            exit 1
          fi

          find release-assets -maxdepth 2 -type f -print | sort

          {
            echo "Automated ofive desktop release for ${{ github.ref_name }}."
            echo
            echo "Included builds:"
            echo "- macOS ARM64"
            echo "- Windows x64 installer and portable zip"
            echo
            echo "This open-source build is ad-hoc signed and intentionally not Apple-notarized."
            echo "If macOS reports the app is damaged or cannot verify the developer, move it to Applications and run:"
            echo
            echo '```bash'
            echo 'xattr -dr com.apple.quarantine /Applications/ofive.app'
            echo '```'
          } > release-body.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ofive ${{ github.ref_name }}
          body_path: release-body.md
          generate_release_notes: true
          draft: false
          prerelease: ${{ needs.release-version.outputs.release-prerelease }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true

  build-windows-installer:
    name: Build Windows x64
    needs:
      - release-version
    runs-on: windows-latest
    env:
      OFIVE_SIDECAR_PROFILE: release
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/go/ofive-ai-agent/go.mod

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri installer bundle
        shell: pwsh
        run: bun run tauri build --target "x86_64-pc-windows-msvc" --ci

      - name: Build portable app archive
        shell: pwsh
        run: bun run package:windows-portable -- --target "x86_64-pc-windows-msvc"

      - name: Collect installer assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $candidateRoots = @(
            "src-tauri/target/x86_64-pc-windows-msvc/release/bundle",
            "src-tauri/target/release/bundle"
          )
          $bundleRoot = $candidateRoots | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $bundleRoot) {
            Write-Error "Tauri bundle directory not found for target x86_64-pc-windows-msvc"
          }

          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $artifacts = Get-ChildItem -Path $bundleRoot -Recurse -File | Where-Object {
            $_.Extension -eq ".msi" -or $_.Extension -eq ".zip" -or ($_.Extension -eq ".exe" -and $_.Name -like "*setup*")
          }

          foreach ($artifact in $artifacts) {
            Copy-Item -LiteralPath $artifact.FullName -Destination (Join-Path "release-assets" "windows-x64-$($artifact.Name)")
          }

          if (-not (Get-ChildItem -Path release-assets -File)) {
            Get-ChildItem -Path $bundleRoot -Recurse -File | Select-Object -ExpandProperty FullName
            Write-Error "No Windows installer assets found under $bundleRoot"
          }

          Get-ChildItem -Path release-assets -File

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ofive-windows-x64-${{ github.ref_name }}
          path: release-assets/*
          if-no-files-found: error
