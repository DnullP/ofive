name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-gate:
    name: Release Test Gate
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup local layout-v2 dependency
        uses: ./.github/actions/setup-local-layout-v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/go/ofive-ai-agent/go.mod

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run Go sidecar tests
        run: bun run test:go

      - name: Build Go sidecar binary
        run: bun run build:go-sidecar

      - name: Verify generated Go stubs are up to date
        run: git diff --exit-code -- sidecars/go/ofive-ai-agent/gen/ofive/aiv1

      - name: Install Playwright browser
        run: bun run test:playwright:install

      - name: Run frontend unit tests
        run: bun run test

      - name: Run Rust tests
        run: bun run test:rust

      - name: Run Playwright end-to-end tests
        run: bun run test:e2e --reporter=line

      - name: Verify production build
        run: bun run build

  create-release:
    name: Create GitHub Release
    needs: test-gate
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  build:
    name: Build ${{ matrix.platform.name }}
    needs:
      - test-gate
      - create-release
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            runner: macos-latest
          - name: Windows
            runner: windows-latest
          - name: Linux
            runner: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup local layout-v2 dependency
        uses: ./.github/actions/setup-local-layout-v2

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecars/go/ofive-ai-agent/go.mod

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Go sidecar binary
        run: bun run build:sidecar

      - name: Build Tauri bundle
        run: bun run tauri build

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find src-tauri/target/release/bundle -type f \
            \( \
              -name "*.dmg" -o \
              -name "*.appimage" -o \
              -name "*.deb" -o \
              -name "*.rpm" -o \
              -name "*.msi" -o \
              -name "*.exe" -o \
              -name "*.zip" \
            \) -print -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.name }}-${{ github.ref_name }}
          path: release-assets/*
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
