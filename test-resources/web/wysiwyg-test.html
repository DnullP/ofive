<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WYSIWYG Test</title>
    <style>
      html, body { height: 100%; margin: 0; background: #1e1e1e; color: #ddd; }
      #app { height: 100%; }
      .cm-editor { height: 100%; }
      .cm-content {
        font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
        font-size: 13px;
        line-height: 1.6;
      }
      .cm-rendered-header {
        display: inline-block;
        width: 100%;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 700;
        color: #fff;
        line-height: 1.3;
        padding: 2px 0;
      }
      .cm-header-marker-hidden { font-size: 0; overflow: hidden; }
      .cm-inline-marker-hidden { font-size: 0; overflow: hidden; }
      .cm-rendered-bold { font-weight: 700; color: #fff; }
      .cm-rendered-header-h1 { font-size: 1.9em; }
      .cm-rendered-header-h2 { font-size: 1.6em; }
      .cm-rendered-header-h3 { font-size: 1.35em; }
      .cm-rendered-header-h4 { font-size: 1.2em; }
      .cm-rendered-header-h5 { font-size: 1.05em; }
      .cm-rendered-header-h6 { font-size: 1em; opacity: .9; }
      .tip {
        position: fixed;
        right: 12px;
        top: 8px;
        background: #000a;
        color: #ccc;
        border: 1px solid #444;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="tip">测试页：Header + Bold 折叠</div>
    <div id="app"></div>

    <script type="module" src="/test-resources/web/wysiwygTest.ts"></script>
  </body>
</html>
